services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: cs_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 若本机 5432 已被占用，映射到 5433；容器内仍为 5432，backend 用 db:5432 不变
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cs_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - chroma_data:/app/chroma_data
      - file_uploads:/app/uploads
      - ../Furniture-Crawler:/app/Furniture-Crawler:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  chroma_data:
  file_uploads:
