name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/cs-agent

            echo ">>> Pulling latest code..."
            git fetch --all --prune
            git reset --hard origin/main

            echo ">>> Rebuilding & restarting containers..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            echo ">>> Cleaning up dangling images..."
            docker image prune -f

            echo ">>> Waiting for backend to be ready..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                   exec -T backend python -c "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/docs', timeout=2)" \
                   >/dev/null 2>&1; then
                echo ">>> Backend is up"
                break
              fi
              sleep 2
            done

            echo ">>> Seeding knowledge base (idempotent)..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend \
              python scripts/import_knowledge.py \
              --base-url http://localhost:8000 \
              --input seed_data/knowledge.json \
              --skip-existing || echo "(baseline seed skipped/failed)"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend \
              python scripts/import_knowledge.py \
              --base-url http://localhost:8000 \
              --input seed_data/cases.json \
              --skip-existing || echo "(cases seed skipped/failed)"

            echo ">>> Current status:"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
